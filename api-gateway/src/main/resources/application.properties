# =============================================
# API GATEWAY — OWN CONFIGURATION
# =============================================
# This is the gateway's local config. It tells the gateway
# where to find Config Server and Eureka.
# Route definitions are in the Config Server (api-gateway.yml)
# but we also define them here as defaults.

spring.application.name=api-gateway
server.port=8080

# =============================================
# IMPORT CONFIG FROM CONFIG SERVER
# =============================================
# On startup, fetch additional configuration from Config Server.
# The "optional:" prefix means the gateway will still start
# even if Config Server is unavailable.
spring.config.import=optional:configserver:http://localhost:8888

# =============================================
# EUREKA CLIENT
# =============================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# =============================================
# GATEWAY ROUTES
# =============================================
# Route 1: USER SERVICE
# Any request to /api/users/** is forwarded to USER-SERVICE
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**,/api/auth/**
spring.cloud.gateway.routes[0].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.replenishRate=20
spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.burstCapacity=40
spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.routes[0].filters[0].args.key-resolver=#{@ipKeyResolver}

# Route 2: PRODUCT SERVICE
# Any request to /api/products/** is forwarded to PRODUCT-SERVICE
spring.cloud.gateway.routes[1].id=product-service
spring.cloud.gateway.routes[1].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/products/**
spring.cloud.gateway.routes[1].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[1].filters[0].args.redis-rate-limiter.replenishRate=30
spring.cloud.gateway.routes[1].filters[0].args.redis-rate-limiter.burstCapacity=60
spring.cloud.gateway.routes[1].filters[0].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.routes[1].filters[0].args.key-resolver=#{@ipKeyResolver}

# Route 3: ORDER SERVICE
# Any request to /api/orders/** is forwarded to ORDER-SERVICE
spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/orders/**
spring.cloud.gateway.routes[2].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[2].filters[0].args.redis-rate-limiter.replenishRate=15
spring.cloud.gateway.routes[2].filters[0].args.redis-rate-limiter.burstCapacity=30
spring.cloud.gateway.routes[2].filters[0].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.routes[2].filters[0].args.key-resolver=#{@ipKeyResolver}

# Route 4: PAYMENT SERVICE
# Any request to /api/payments/** is forwarded to PAYMENT-SERVICE
spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/payments/**
spring.cloud.gateway.routes[3].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[3].filters[0].args.redis-rate-limiter.replenishRate=10
spring.cloud.gateway.routes[3].filters[0].args.redis-rate-limiter.burstCapacity=20
spring.cloud.gateway.routes[3].filters[0].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.routes[3].filters[0].args.key-resolver=#{@ipKeyResolver}

# Route 5: DISCOVERY SERVER DASHBOARD (for convenience)
# Access Eureka dashboard through the gateway
spring.cloud.gateway.routes[4].id=discovery-server
spring.cloud.gateway.routes[4].uri=http://localhost:8761
spring.cloud.gateway.routes[4].predicates[0]=Path=/eureka/web
spring.cloud.gateway.routes[4].filters[0]=SetPath=/

# Eureka static resources (CSS/JS for the dashboard)
spring.cloud.gateway.routes[5].id=discovery-server-static
spring.cloud.gateway.routes[5].uri=http://localhost:8761
spring.cloud.gateway.routes[5].predicates[0]=Path=/eureka/**

# =============================================
# GATEWAY GLOBAL SETTINGS
# =============================================
# Enable discovery locator so gateway can find services via Eureka
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
spring.cloud.gateway.httpclient.connect-timeout=5000
spring.cloud.gateway.httpclient.response-timeout=10s

# Allowed frontend origins for local development; override per environment.
app.cors.allowed-origin-patterns=http://localhost:3000,http://localhost:5173

# =============================================
# LOGGING
# =============================================
logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty=WARN

# =============================================
# REDIS — for rate limiting
# =============================================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# =============================================
# ACTUATOR
# =============================================
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.enabled=true
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
