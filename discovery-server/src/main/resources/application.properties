# =============================================
# EUREKA DISCOVERY SERVER CONFIGURATION
# =============================================

# Application name — this is how this service identifies itself
spring.application.name=discovery-server

# Port — Eureka conventionally runs on 8761
server.port=8761

# =============================================
# EUREKA SERVER SETTINGS
# =============================================

# Don't register this server with itself.
# (Eureka server IS the registry — it doesn't need to register as a client)
eureka.client.register-with-eureka=false

# Don't fetch the registry from itself.
# (There's no other Eureka server to fetch from in a single-node setup)
eureka.client.fetch-registry=false

# =============================================
# EUREKA DASHBOARD
# =============================================
# The Eureka web dashboard is enabled by default.
# Access it at: http://localhost:8761

# =============================================
# LOGGING
# =============================================
logging.level.com.netflix.eureka=OFF
logging.level.com.netflix.discovery=OFF
