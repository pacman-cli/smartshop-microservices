name: Java CI/CD with Maven

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: user_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Initialize Databases
      run: |
        docker exec ${{ job.services.postgres.id }} psql -U postgres -c "CREATE DATABASE product_db;"
        docker exec ${{ job.services.postgres.id }} psql -U postgres -c "CREATE DATABASE order_db;"
        docker exec ${{ job.services.postgres.id }} psql -U postgres -c "CREATE DATABASE payment_db;"

    - name: Build with Maven
      run: mvn -B clean install -DskipTests

    - name: Run Tests
      run: mvn -B test
