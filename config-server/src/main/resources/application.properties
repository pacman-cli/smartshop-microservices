# =============================================
# CONFIG SERVER CONFIGURATION
# =============================================

spring.application.name=config-server
server.port=8888

# =============================================
# CONFIG SOURCE — Native Filesystem
# =============================================
# Use "native" profile to read config files from local filesystem
# instead of a Git repository. Good for local development.
spring.profiles.active=native

# Path to the directory containing config files for all services.
# Each file is named after the service: user-service.yml, product-service.yml, etc.
spring.cloud.config.server.native.search-locations=classpath:/configurations

# =============================================
# EUREKA CLIENT — Register with Discovery Server
# =============================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# =============================================
# ACTUATOR — Health & Info endpoints
# =============================================
management.endpoints.web.exposure.include=health,info
