# =============================================
# USER SERVICE CONFIGURATION
# =============================================
# Served by Config Server to user-service on startup

server:
  port: 8081

# PostgreSQL Database — each service gets its own database
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/user_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Eureka registration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# JWT Configuration
jwt:
  secret: smartshop-secret-key-for-jwt-token-generation-min-256-bits-long-key
  expiration: 86400000  # 24 hours in milliseconds
